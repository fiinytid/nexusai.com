<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS AI — Login</title>
<link rel="icon" href="nexusai.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{--bg:#030312;--bg2:#06071a;--bg3:#0a0b22;--cyan:#00e5ff;--cyan2:rgba(0,229,255,.35);--purple:#8800ff;--pink:#ff2d6b;--green:#00ffaa;--yellow:#ffd600;--text:#b8cfff;--dim:#3a4a7a;--b:rgba(0,229,255,.12);--gc:0 0 30px rgba(0,229,255,.2);--gp:0 0 30px rgba(136,0,255,.2);--r:8px;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);font-size:13px;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(0,229,255,.015)1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.015)1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#0e003a 0%,var(--bg) 65%);}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
.box{position:relative;width:440px;background:var(--bg2);border:1px solid var(--b);border-radius:16px;padding:38px 32px 30px;text-align:center;box-shadow:var(--gc),var(--gp);animation:boxIn .5s cubic-bezier(.16,1,.3,1);z-index:1;}
.box::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);border-radius:2px;}
@keyframes boxIn{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:none}}
.logo{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;margin-bottom:2px;}
.tag{font-size:9px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
.version{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:rgba(0,229,255,.06);border:1px solid var(--b);border-radius:20px;font-size:9px;color:var(--cyan);margin-bottom:18px;}
.vdot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pd 1.8s infinite;}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
.lang-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px;}
.lang-select{background:var(--bg3);border:1px solid var(--b);border-radius:6px;padding:4px 8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;cursor:pointer;}
.lang-select:focus{border-color:var(--cyan2);}
.lang-label{font-size:10px;color:var(--dim);}
.login-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg3);border-radius:var(--r);padding:3px;}
.login-tab{flex:1;padding:7px;border-radius:5px;font-size:10px;cursor:pointer;color:var(--dim);border:none;background:none;font-family:'JetBrains Mono',monospace;transition:.15s;}
.login-tab.act{background:var(--bg2);color:var(--cyan);box-shadow:0 1px 4px rgba(0,0,0,.4);}
.login-tab:hover:not(.act){color:var(--text);}
.tab-panel{display:none;}
.tab-panel.show{display:block;}
.step-label{font-size:11px;color:var(--dim);margin-bottom:14px;line-height:1.6;}
.inp{width:100%;background:rgba(0,229,255,.04);border:1px solid var(--b);border-radius:var(--r);padding:12px 14px;color:white;font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:.2s;margin-bottom:10px;}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,229,255,.07);}
.inp::placeholder{color:var(--dim);}
.inp-pw{width:100%;background:rgba(255,45,107,.04);border:1px solid rgba(255,45,107,.18);border-radius:var(--r);padding:12px 14px;color:white;font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:.2s;margin-bottom:10px;}
.inp-pw:focus{border-color:var(--pink);}
.inp-pw::placeholder{color:var(--dim);}
.btn{width:100%;background:linear-gradient(135deg,var(--cyan),var(--purple));color:white;border:none;border-radius:var(--r);padding:12px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:1px;margin-bottom:8px;}
.btn:hover{opacity:.85;transform:translateY(-1px);box-shadow:var(--gc);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-google{width:100%;background:white;color:#3c4043;border:1px solid #dadce0;border-radius:var(--r);padding:11px;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;transition:.2s;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-google:hover{background:#f8f9fa;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.btn-google:disabled{opacity:.5;cursor:not-allowed;}
.btn-google svg{flex-shrink:0;}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--dim);font-size:10px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b);}
.prev{display:none;flex-direction:column;align-items:center;gap:8px;margin-top:8px;padding:16px;background:rgba(0,229,255,.03);border:1px solid var(--b);border-radius:var(--r);}
.prev.show{display:flex;}
.av{width:76px;height:76px;border-radius:50%;border:2px solid var(--cyan);box-shadow:0 0 20px rgba(0,229,255,.3);object-fit:cover;background:var(--bg3);}
.un{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:white;}
.uid{font-size:9px;color:var(--dim);}
.err{display:none;color:var(--pink);font-size:10px;padding:8px 12px;background:rgba(255,45,107,.07);border-radius:5px;border:1px solid rgba(255,45,107,.18);margin-top:5px;text-align:left;}
.err.show{display:block;}
.ld{display:none;align-items:center;justify-content:center;gap:8px;color:var(--dim);font-size:10px;margin-top:8px;}
.ld.show{display:flex;}
.spin{width:14px;height:14px;border:2px solid var(--b);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.google-user-preview{display:none;padding:12px;background:rgba(0,229,255,.04);border:1px solid var(--b);border-radius:var(--r);text-align:center;margin-bottom:10px;}
.google-user-preview.show{display:block;}
.google-av{width:52px;height:52px;border-radius:50%;border:2px solid var(--cyan);margin:0 auto 8px;}
.google-name{font-size:13px;color:white;font-weight:600;}
.google-email{font-size:10px;color:var(--dim);margin-top:2px;}
.footer{margin-top:20px;font-size:9px;color:var(--dim);text-align:center;line-height:1.8;}
.footer span{color:var(--cyan);}
.p{position:absolute;border-radius:50%;pointer-events:none;animation:float linear infinite;}
@keyframes float{0%{transform:translateY(100vh) translateX(0) scale(0);opacity:0}10%{opacity:.6}90%{opacity:.4}100%{transform:translateY(-10vh) translateX(30px) scale(1.2);opacity:0}}
@media(max-width:480px){.box{width:95vw;padding:28px 18px;}.logo{font-size:22px;}}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="page">
  <div class="box">
    <div class="logo">NEXUS AI</div>
    <div class="tag">Roblox Dev Intelligence</div>
    <div class="version"><div class="vdot"></div> v5.0 Online</div>

    <div class="lang-row">
      <span class="lang-label">
        <svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
      </span>
      <select class="lang-select" id="langSel" onchange="setLang(this.value)">
        <option value="id">Bahasa Indonesia</option>
        <option value="en">English</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="zh">Chinese</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="pt">Português</option>
        <option value="ru">Русский</option>
      </select>
    </div>

    <!-- Login Tabs -->
    <div class="login-tabs">
      <button class="login-tab act" id="tabRoblox" onclick="switchLoginTab('roblox')">
        <svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:4px"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
        Roblox
      </button>
      <button class="login-tab" id="tabGoogle" onclick="switchLoginTab('google')">
        <svg width="12" height="12" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:4px" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
    </div>

    <!-- ROBLOX LOGIN PANEL -->
    <div class="tab-panel show" id="panelRoblox">
      <div class="step-label" id="stepLabel">Login dengan username Roblox kamu</div>
      <input type="text" id="unInput" class="inp" placeholder="Username Roblox kamu..." autocomplete="off" spellcheck="false">
      <button class="btn" id="findBtn" onclick="findUser()">CARI AKUN ROBLOX</button>
      <div class="ld" id="ld"><div class="spin"></div><span id="ldTxt">Mencari...</span></div>
      <div class="err" id="err"></div>
      <div class="prev" id="prev">
        <img class="av" id="avImg" src="" alt="">
        <div class="un" id="unName"></div>
        <div class="uid" id="unId"></div>
        <div style="width:100%;">
          <input type="password" id="pwInput" class="inp-pw" placeholder="Password untuk verifikasi..." autocomplete="new-password">
          <div class="err" id="pwErr"></div>
        </div>
        <button class="btn" onclick="doLogin()" id="loginBtn">LOGIN</button>
      </div>
    </div>

    <!-- GOOGLE LOGIN PANEL -->
    <div class="tab-panel" id="panelGoogle">
      <div class="step-label">Login dengan akun Google kamu</div>
      <div class="google-user-preview" id="googlePreview">
        <img class="google-av" id="googleAvImg" src="" alt="">
        <div class="google-name" id="googleName">-</div>
        <div class="google-email" id="googleEmail">-</div>
      </div>
      <div class="err" id="googleErr"></div>
      <div class="ld" id="googleLd"><div class="spin"></div><span>Menghubungi Google...</span></div>
      <!-- Google One Tap / Sign In button -->
      <div id="googleSignInDiv" style="display:flex;justify-content:center;margin-bottom:10px;"></div>
      <button class="btn-google" id="googleSignInBtn" onclick="googleSignIn()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Lanjutkan dengan Google
      </button>
      <div style="font-size:9px;color:var(--dim);text-align:center;margin-top:6px;">
        Memerlukan GMAIL_KEY di environment variables Vercel
      </div>
    </div>

    <div class="footer">
      Made by <span>NEXUS STUDIO</span> · YouTube: <span>NEXUS STUDIO</span><br>
      <span style="font-size:8px;color:var(--dim);">nexusai-com.vercel.app</span>
    </div>
  </div>
</div>

<script>
// Particles
(function(){
  var p=document.getElementById('particles');
  for(var i=0;i<18;i++){
    var d=document.createElement('div');d.className='p';
    var sz=Math.random()*4+1;
    d.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;background:rgba('+( Math.random()>.5?'0,229,255':'136,0,255')+','+(Math.random()*.4+.1)+');animation-duration:'+(Math.random()*12+8)+'s;animation-delay:'+(Math.random()*10)+'s;';
    p.appendChild(d);
  }
})();

var OWNER_USERS=['FIINYTID25','fiinytid25'];
var OWNER_PW='arif1n12';
var pendUser=null;
var GOOGLE_CLIENT_ID = ''; // Will be fetched from /api/main

// Fetch Google Client ID from server
async function loadGmailKey(){
  try{
    var r = await fetch('/api/main');
    if(r.ok){ var d = await r.json(); GOOGLE_CLIENT_ID = d.gmail_key || d.gmail || ''; }
  }catch(e){}
}
loadGmailKey();

// Language
var LANG_TEXTS={
  id:{step:'Login dengan username Roblox kamu',find:'CARI AKUN ROBLOX',searching:'Mencari...',loading:'Memuat avatar...',login:'LOGIN',pw:'Password untuk verifikasi...'},
  en:{step:'Login with your Roblox username',find:'FIND ROBLOX ACCOUNT',searching:'Searching...',loading:'Loading avatar...',login:'LOGIN',pw:'Password to verify...'},
  ja:{step:'Robloxのユーザー名でログイン',find:'アカウントを検索',searching:'検索中...',loading:'読み込み中...',login:'ログイン',pw:'パスワード...'},
  ko:{step:'Roblox 사용자 이름으로 로그인',find:'계정 찾기',searching:'검색 중...',loading:'로딩 중...',login:'로그인',pw:'비밀번호...'},
  zh:{step:'使用Roblox用户名登录',find:'查找账号',searching:'搜索中...',loading:'加载中...',login:'登录',pw:'密码...'},
  es:{step:'Login con tu usuario Roblox',find:'BUSCAR CUENTA',searching:'Buscando...',loading:'Cargando...',login:'INGRESAR',pw:'Contraseña...'},
  fr:{step:'Connexion Roblox',find:'TROUVER COMPTE',searching:'Recherche...',loading:'Chargement...',login:'CONNEXION',pw:'Mot de passe...'},
  de:{step:'Roblox Login',find:'KONTO SUCHEN',searching:'Suche...',loading:'Laden...',login:'ANMELDEN',pw:'Passwort...'},
  pt:{step:'Login Roblox',find:'ENCONTRAR CONTA',searching:'Buscando...',loading:'Carregando...',login:'ENTRAR',pw:'Senha...'},
  ru:{step:'Войти через Roblox',find:'НАЙТИ АККАУНТ',searching:'Поиск...',loading:'Загрузка...',login:'ВОЙТИ',pw:'Пароль...'},
};
var curLang='id';
function setLang(l){
  curLang=l; localStorage.setItem('nexus_lang',l);
  var t=LANG_TEXTS[l]||LANG_TEXTS.id;
  document.getElementById('stepLabel').textContent=t.step;
  document.getElementById('findBtn').textContent=t.find;
  document.getElementById('pwInput').placeholder=t.pw;
}
(function(){ var s=localStorage.getItem('nexus_lang')||'id'; document.getElementById('langSel').value=s; setLang(s); })();

// Tab switch
function switchLoginTab(tab){
  document.getElementById('tabRoblox').classList.toggle('act', tab==='roblox');
  document.getElementById('tabGoogle').classList.toggle('act', tab==='google');
  document.getElementById('panelRoblox').classList.toggle('show', tab==='roblox');
  document.getElementById('panelGoogle').classList.toggle('show', tab==='google');
}

// Google Sign In
function googleSignIn(){
  if(!GOOGLE_CLIENT_ID){
    document.getElementById('googleErr').textContent='Google Client ID belum dikonfigurasi. Tambahkan GMAIL_KEY di Vercel Environment Variables.';
    document.getElementById('googleErr').classList.add('show');
    return;
  }
  // Use Google Identity Services
  if(typeof google === 'undefined' || !google.accounts){
    document.getElementById('googleErr').textContent='Google API belum loaded. Coba refresh halaman.';
    document.getElementById('googleErr').classList.add('show');
    return;
  }
  document.getElementById('googleLd').classList.add('show');
  document.getElementById('googleSignInBtn').disabled=true;
  google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'email profile',
    callback: handleGoogleToken,
  }).requestAccessToken();
}

async function handleGoogleToken(tokenResp){
  document.getElementById('googleLd').classList.remove('show');
  if(!tokenResp || tokenResp.error){
    document.getElementById('googleErr').textContent='Login Google gagal: '+(tokenResp.error||'unknown');
    document.getElementById('googleErr').classList.add('show');
    document.getElementById('googleSignInBtn').disabled=false;
    return;
  }
  try{
    // Get user info from Google
    var r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: 'Bearer ' + tokenResp.access_token }
    });
    var gUser = await r.json();
    if(!gUser.id){ throw new Error('Failed to get Google user info'); }

    // Show preview
    document.getElementById('googleAvImg').src = gUser.picture || '';
    document.getElementById('googleName').textContent = gUser.name || gUser.email;
    document.getElementById('googleEmail').textContent = gUser.email || '';
    document.getElementById('googlePreview').classList.add('show');

    // Create session
    var isOwner = OWNER_USERS.indexOf(gUser.name) !== -1 || OWNER_USERS.indexOf(gUser.email.split('@')[0]) !== -1;
    var username = (gUser.name || gUser.email.split('@')[0]).replace(/\s+/g, '_');
    var userData = {
      credits: isOwner ? 999999 : 30,
      convs:[], plan:'free', lastClaim:null,
      draftText:{}, draftAttach:{},
      model:{id:'gemini-2.0-flash',provider:'gemini',cost:0,label:'Gemini 2.0 Flash'},
      language: curLang, roles: isOwner ? ['owner'] : [],
      loginMethod: 'google',
    };
    // Try load existing
    try{
      var sr = await fetch('/api/sync?user='+encodeURIComponent(username.toLowerCase()));
      if(sr.ok){ var sd = await sr.json(); if(sd&&sd.credits!==undefined) userData = {...userData, ...sd}; }
    }catch(e){}
    userData.avatar = gUser.picture || '';
    var session = {
      user:{ id:gUser.id, username:username, displayName:gUser.name, avatar:gUser.picture||'nexusai.png', email:gUser.email },
      data: userData, loginTime: Date.now()
    };
    localStorage.setItem('nexus_session', JSON.stringify(session));
    localStorage.setItem('nexus_lang', curLang);
    try{ fetch('/api/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:username.toLowerCase(),data:userData})}); }catch(e){}
    window.location.href='/index.html';
  }catch(e){
    document.getElementById('googleErr').textContent='Error: '+e.message;
    document.getElementById('googleErr').classList.add('show');
    document.getElementById('googleSignInBtn').disabled=false;
  }
}

// Roblox API
async function fetchRoblox(url){
  var proxies=['https://corsproxy.io/?','https://api.allorigins.win/raw?url='];
  for(var i=0;i<proxies.length;i++){
    try{
      var r=await fetch(proxies[i]+encodeURIComponent(url),{signal:AbortSignal.timeout(7000)});
      if(!r.ok)continue;
      return JSON.parse(await r.text());
    }catch(e){}
  }
  try{var r=await fetch(url);if(r.ok)return await r.json();}catch(e){}
  throw new Error('Tidak bisa terhubung ke Roblox API');
}

async function findUser(){
  var un=document.getElementById('unInput').value.trim();
  if(!un){showErr('err','Masukkan username Roblox kamu!');return;}
  hideEl('err');hideEl('prev');
  show('ld');
  document.getElementById('ldTxt').textContent=(LANG_TEXTS[curLang]||LANG_TEXTS.id).searching;
  document.getElementById('findBtn').disabled=true;
  try{
    var d=await fetchRoblox('https://users.roblox.com/v1/users/search?keyword='+encodeURIComponent(un)+'&limit=10');
    if(!d.data||!d.data.length)throw new Error('Akun "'+un+'" tidak ditemukan di Roblox');
    var u=d.data.find(function(x){return x.name.toLowerCase()===un.toLowerCase();})||d.data[0];
    document.getElementById('ldTxt').textContent=(LANG_TEXTS[curLang]||LANG_TEXTS.id).loading;
    var avUrl='https://www.roblox.com/headshot-thumbnail/image?userId='+u.id+'&width=420&height=420&format=png';
    try{
      var td=await fetchRoblox('https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds='+u.id+'&size=420x420&format=Png');
      if(td.data&&td.data[0]&&td.data[0].imageUrl)avUrl=td.data[0].imageUrl;
    }catch(e){}
    pendUser={id:u.id,username:u.name,displayName:u.displayName||u.name,avatar:avUrl};
    document.getElementById('avImg').src=avUrl;
    document.getElementById('unName').textContent=u.name;
    document.getElementById('unId').textContent='ID: '+u.id;
    document.getElementById('loginBtn').textContent=(LANG_TEXTS[curLang]||LANG_TEXTS.id).login;
    show('prev');
    document.getElementById('pwInput').focus();
  }catch(e){showErr('err',e.message);}
  finally{hide('ld');document.getElementById('findBtn').disabled=false;}
}

async function doLogin(){
  if(!pendUser)return;
  var pw=document.getElementById('pwInput').value;
  if(!pw){showErr('pwErr','Masukkan password untuk verifikasi.');return;}
  if(OWNER_USERS.indexOf(pendUser.username)!==-1){
    if(pw!==OWNER_PW){showErr('pwErr','Password salah.');return;}
  }else{
    if(pw.length<1){showErr('pwErr','Masukkan password.');return;}
  }
  hideEl('pwErr');
  var existing=null;
  try{
    var r=await fetch('/api/sync?user='+encodeURIComponent(pendUser.username.toLowerCase()));
    if(r.ok){var d=await r.json();if(d&&d.credits!==undefined)existing=d;}
  }catch(e){}
  var isOwner=OWNER_USERS.indexOf(pendUser.username)!==-1;
  var defaultData={
    credits:isOwner?999999:30,
    convs:[],plan:'free',lastClaim:null,
    draftText:{},draftAttach:{},
    model:{id:'gemini-2.0-flash',provider:'gemini',cost:0,label:'Gemini 2.0 Flash'},
    language:curLang,roles:isOwner?['owner']:[]
  };
  var userData=existing||defaultData;
  userData.avatar=pendUser.avatar;
  var session={
    user:{id:pendUser.id,username:pendUser.username,displayName:pendUser.displayName,avatar:pendUser.avatar},
    data:userData,loginTime:Date.now()
  };
  localStorage.setItem('nexus_session',JSON.stringify(session));
  localStorage.setItem('nexus_lang',curLang);
  try{fetch('/api/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:pendUser.username.toLowerCase(),data:userData})});}catch(e){}
  window.location.href='/index.html';
}

function showErr(id,msg){var e=document.getElementById(id);if(e){e.textContent=msg;e.classList.add('show');}}
function hideEl(id){var e=document.getElementById(id);if(e)e.classList.remove('show');}
function show(id){var e=document.getElementById(id);if(e)e.classList.add('show');}
function hide(id){var e=document.getElementById(id);if(e)e.classList.remove('show');}

document.getElementById('unInput').addEventListener('keydown',function(e){if(e.key==='Enter')findUser();});
document.getElementById('pwInput').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

(function(){
  try{
    var s=localStorage.getItem('nexus_session');
    if(s){var p=JSON.parse(s);if(p&&p.user&&p.loginTime&&(Date.now()-p.loginTime)<86400000*7){window.location.href='/index.html';}}
  }catch(e){}
})();
</script>
