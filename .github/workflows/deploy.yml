name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Keys
        run: |
          # Mengganti semua placeholder dengan Secret masing-masing
          sed -i "s|INSERT_GEMINI_KEY_HERE|${{ secrets.GEMINI_API_KEY }}|g" index.html
          sed -i "s|INSERT_CLAUDE_KEY_HERE|${{ secrets.CLAUDE_API_KEY }}|g" index.html
          sed -i "s|INSERT_OPENAI_KEY_HERE|${{ secrets.OPENAI_API_KEY }}|g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
