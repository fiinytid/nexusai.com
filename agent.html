<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NEXUS AI — Support Agent</title>
  <link rel="icon" href="nexusai.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #030312; --bg2: #06071a; --bg3: #0a0b22;
      --cyan: #00e5ff; --cyan2: rgba(0,229,255,.35);
      --purple: #8800ff; --pink: #ff2d6b; --green: #00ffaa; --yellow: #ffd600;
      --text: #b8cfff; --dim: #3a4a7a;
      --b: rgba(0,229,255,.12); --r: 8px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg); color: var(--text);
      font-size: 13px; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        linear-gradient(rgba(0,229,255,.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.012) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* ── LAYOUT ── */
    #container {
      display: flex; flex-direction: column;
      height: 100vh; position: relative; z-index: 1;
    }

    /* ── HEADER ── */
    #header {
      padding: 10px 16px;
      background: rgba(6,7,26,.96);
      border-bottom: 1px solid var(--b);
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; backdrop-filter: blur(12px);
    }
    .header-logo {
      width: 32px; height: 32px; border-radius: 8px; overflow: hidden; flex-shrink: 0;
    }
    .header-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .header-title {
      font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700;
      color: var(--cyan); flex: 1; letter-spacing: .5px;
    }
    .header-title span { color: var(--dim); font-weight: 400; font-size: 10px; margin-left: 6px; }
    .header-user { display: flex; align-items: center; gap: 8px; }
    .header-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1.5px solid var(--cyan2); object-fit: cover; background: var(--bg3);
    }
    .header-name {
      font-size: 10px; color: white; font-weight: 500;
      max-width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #closeBtn {
      background: rgba(255,45,107,.08);
      border: 1px solid rgba(255,45,107,.2);
      color: var(--pink); padding: 5px 12px;
      border-radius: var(--r); font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer; transition: .15s; flex-shrink: 0;
    }
    #closeBtn:hover { background: rgba(255,45,107,.15); border-color: var(--pink); }

    /* ── STATUS BAR ── */
    #statusBar {
      padding: 5px 16px;
      background: rgba(0,255,170,.04);
      border-bottom: 1px solid rgba(0,255,170,.08);
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      animation: blink 2s ease infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
    .status-text { font-size: 9px; color: var(--green); letter-spacing: .5px; }

    /* ── CHAT ── */
    #chat {
      flex: 1; overflow-y: auto;
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }
    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-thumb { background: var(--b); border-radius: 2px; }

    /* ── WELCOME ── */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; text-align: center;
      gap: 12px; color: var(--dim); padding: 32px 24px;
    }
    .welcome-avatar {
      width: 72px; height: 72px; border-radius: 50%; overflow: hidden;
      border: 2px solid rgba(0,229,255,.3);
      box-shadow: 0 0 24px rgba(0,229,255,.1);
    }
    .welcome-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .welcome-badge {
      font-size: 8px; font-family: 'Orbitron', sans-serif; letter-spacing: 2px;
      color: var(--dim); background: rgba(0,229,255,.06);
      border: 1px solid var(--b); padding: 3px 10px; border-radius: 20px;
    }
    .welcome-title {
      font-family: 'Orbitron', sans-serif; font-size: 19px; font-weight: 900;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }
    .welcome-text {
      font-size: 12px; max-width: 380px; line-height: 1.75; color: var(--text);
    }
    .welcome-text strong { color: white; }
    .welcome-hints {
      display: flex; flex-direction: column; gap: 6px;
      width: 100%; max-width: 360px; margin-top: 4px;
    }
    .hint-chip {
      background: var(--bg2); border: 1px solid var(--b);
      border-radius: 6px; padding: 8px 12px; font-size: 10px; color: var(--text);
      cursor: pointer; text-align: left; transition: .15s;
      display: flex; align-items: center; gap: 8px;
    }
    .hint-chip:hover { border-color: var(--cyan2); color: var(--cyan); }
    .hint-chip .hint-icon { flex-shrink: 0; font-size: 12px; }

    /* ── MESSAGES ── */
    .msg { display: flex; gap: 8px; animation: msgIn .2s ease; }
    @keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%; overflow: hidden;
      flex-shrink: 0; background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--cyan);
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg.user { flex-direction: row-reverse; }
    .msg.user .msg-avatar { color: var(--purple); }
    .msg-bubble {
      max-width: 80%; padding: 10px 14px; border-radius: 10px;
      line-height: 1.65; font-size: 12.5px;
      word-break: break-word; overflow-wrap: break-word; min-width: 0;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, rgba(0,229,255,.08), rgba(136,0,255,.08));
      border: 1px solid rgba(0,229,255,.15);
      border-radius: 10px 2px 10px 10px; color: white;
    }
    .msg.ai .msg-bubble {
      background: var(--bg2); border: 1px solid var(--b);
      border-radius: 2px 10px 10px 10px; color: var(--text);
    }
    .msg-bubble p { margin: 0 0 6px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 6px 0; }
    .msg-bubble li { margin-bottom: 3px; }
    .msg-bubble strong { color: white; }
    .msg-bubble em { color: var(--cyan); font-style: normal; }
    .msg-bubble code {
      background: rgba(0,229,255,.08); padding: 2px 5px; border-radius: 3px;
      font-size: 10px; color: var(--cyan); word-break: break-all;
    }
    .msg-bubble a { color: var(--cyan); text-decoration: none; }
    .msg-bubble a:hover { text-decoration: underline; }
    .msg-time { font-size: 9px; color: var(--dim); margin-top: 4px; text-align: right; }
    .msg.ai .msg-time { text-align: left; }

    /* ── TYPING ── */
    .typing { display: flex; gap: 8px; animation: msgIn .2s ease; }
    .typing-bubble {
      background: var(--bg2); border: 1px solid var(--b);
      border-radius: 2px 10px 10px 10px; padding: 12px 16px;
      display: flex; gap: 5px; align-items: center;
    }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--cyan); animation: pulse 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,60%,100%{opacity:.2} 30%{opacity:1} }

    /* ── INPUT AREA ── */
    #inputArea {
      padding: 10px 14px 14px;
      border-top: 1px solid var(--b);
      background: rgba(6,7,26,.96);
      backdrop-filter: blur(12px);
      display: flex; gap: 8px; align-items: flex-end;
    }
    #userInput {
      flex: 1; background: var(--bg3);
      border: 1px solid var(--b); border-radius: 10px;
      padding: 10px 14px; color: white;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      resize: none; min-height: 44px; max-height: 120px;
      outline: none; line-height: 1.5; transition: border-color .15s;
    }
    #userInput::placeholder { color: var(--dim); }
    #userInput:focus { border-color: var(--cyan2); }
    .btn-send {
      width: 40px; height: 40px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border: none; border-radius: 50%;
      color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: .2s;
    }
    .btn-send:hover:not(:disabled) { opacity: .8; transform: scale(1.06); }
    .btn-send:disabled { opacity: .35; cursor: not-allowed; }
    .btn-send svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      #header { padding: 8px 12px; }
      #chat { padding: 10px; }
      .welcome-avatar { width: 54px; height: 54px; }
      .welcome-title { font-size: 16px; }
      #inputArea { padding: 8px 10px 12px; }
    }
  </style>
</head>
<body>
<div id="container">

  <!-- HEADER -->
  <div id="header">
    <div class="header-logo">
      <img src="nexusai.png" alt="NEXUS AI" onerror="this.style.background='linear-gradient(135deg,#00e5ff,#8800ff)'">
    </div>
    <div class="header-title">
      NEXUS AI<span>Support Agent</span>
    </div>
    <div class="header-user" id="headerUser">
      <img class="header-avatar" id="headerAvatar" src="nexusai.png" alt="avatar" onerror="this.style.display='none'">
      <span class="header-name" id="headerName">—</span>
    </div>
    <button id="closeBtn" onclick="goBack()">Close</button>
  </div>

  <!-- STATUS BAR -->
  <div id="statusBar">
    <div class="status-dot"></div>
    <div class="status-text">ONLINE · AI Support Active</div>
  </div>

  <!-- CHAT -->
  <div id="chat"></div>

  <!-- INPUT AREA -->
  <div id="inputArea">
    <textarea
      id="userInput"
      placeholder="Describe your issue or question…"
      rows="1"
    ></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMsg()" title="Send message">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

</div><!-- /container -->

<script>
// ── SESSION ───────────────────────────────────────────────────────────────────
var SESSION = (function() {
  try { return JSON.parse(localStorage.getItem('nexus_session')); } catch(e) { return null; }
})();
var user        = (SESSION && SESSION.user) ? SESSION.user : {};
var displayName = user.displayName || user.username || 'User';
var username    = user.username    || 'user';
var avatarUrl   = user.avatar      || 'nexusai.png';

// Populate header
document.getElementById('headerAvatar').src      = avatarUrl;
document.getElementById('headerName').textContent = displayName;

function goBack() {
  if (window.opener) { window.close(); return; }
  window.location.href = '/';
}

// ── SYSTEM PROMPT ─────────────────────────────────────────────────────────────
var SYSTEM_PROMPT = [
  '🌟 You are NEXUS AI Support Agent — the official, knowledgeable support assistant for NEXUS AI,',
  'the most advanced Roblox Developer AI Assistant platform created by NEXUS STUDIO (FIINYTID25).',
  '',
  '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',
  '👤 CURRENT USER: ' + displayName + ' (@' + username + ')',
  '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',
  '',
  '🎯 YOUR ROLE:',
  'You are a Tier-1 support agent. Help users resolve issues with the NEXUS AI platform.',
  'You are NOT a code-writing AI — the main AI Chat on NEXUS AI handles that.',
  'Your job is troubleshooting, guidance, tips, and escalation.',
  '',
  '🧠 PLATFORM KNOWLEDGE:',
  '',
  'NEXUS AI has 3 core features:',
  '  1. AI Chat — generates Lua/Luau scripts, debugs code, builds GUIs, full game systems.',
  '     Models: Gemini 2.5 Flash, Gemini 2.5 Flash Lite, Mistral, Groq, DeepSeek, and more.',
  '  2. GUI Editor — drag-and-drop visual builder for Roblox interfaces (no code needed).',
  '  3. Studio Plugin — injects code/JSON commands directly into Roblox Studio in real time.',
  '',
  'WEB PAGES:',
  '  • /chats       — Main AI Chat interface',
  '  • /login.html  — Login / registration',
  '  • /payment     — Credits purchase',
  '  • /agent.html  — You are here (Support Agent)',
  '  • /settings    — Account settings & preferences',
  '',
  'STUDIO PLUGIN:',
  '  • Install location: C:\\Users\\[YourName]\\AppData\\Local\\Roblox\\Plugins\\',
  '  • Required Roblox Studio permissions: HTTP Requests + Script Injection',
  '  • Connection status: "Studio: ON" (green) = connected | "Studio: OFF" (red) = not connected',
  '  • If offline: check permissions, reinstall plugin, restart Roblox Studio',
  '',
  'CREDITS SYSTEM:',
  '  • Credits (CR) = platform currency consumed per AI request',
  '  • Free Plan:  30 CR on signup, +2 CR daily',
  '  • Pro Plan:   200 CR on activation, +25 CR daily (auto), all models unlocked',
  '  • One-time packs: 50 CR / 80 CR / 150 CR / 500 CR',
  '  • Payment: OVO & DANA (Indonesian e-wallets)',
  '  • Codes can be redeemed in Settings → Redeem Code',
  '',
  'COMMON ISSUES & SOLUTIONS:',
  '  • AI output incomplete → use a more specific, detailed prompt; try a different model',
  '  • Studio plugin not connecting → enable HTTP Requests in Studio > Security settings',
  '  • Credits not added → wait up to 24h; keep payment screenshot; contact via email',
  '  • Login issues → clear browser cache; try incognito; check email for verification',
  '  • Slow response → try Gemini Flash Lite model; check internet connection',
  '  • GUI Editor not saving → refresh page, check browser compatibility (Chrome recommended)',
  '',
  'SUPPORT CHANNELS:',
  '  • Bug report: Settings → Report Issue',
  '  • Discord: discord.gg/HuGtbRvD',
  '  • Email: arifiinytid@gmail.com',
  '',
  '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',
  '📏 STRICT RULES:',
  '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',
  '',
  '✅ DO:',
  '  • Troubleshoot all platform issues (website, plugin, AI Chat, credits, login, payment)',
  '  • Give clear step-by-step solutions',
  '  • Offer prompt improvement tips if the user is getting poor AI output',
  '    Example: "Try: \'Create a loading screen GUI with animated progress bar and Loading... text\'"',
  '  • Be encouraging and patient — users may be beginners',
  '  • Direct to main chat, bug report, or Discord when appropriate',
  '  • Address the user by name: ' + displayName,
  '',
  '❌ NEVER DO:',
  '  • Write Lua/Luau/Roblox code or scripts here — say:',
  '    "For full code, please use the main NEXUS AI Chat — the AI there will write it for you!"',
  '  • Pretend to be a code-generating AI',
  '  • Make up features or platform details not listed above',
  '  • Provide personal opinions about other platforms or services',
  '',
  '💬 TONE & STYLE:',
  '  • Professional yet friendly and approachable',
  '  • Concise answers — lead with the solution, add context after',
  '  • Use bullet points for multi-step instructions',
  '  • Use bold for important terms or actions',
  '  • Keep responses focused — avoid unnecessary filler text',
  '  • If unsure, say so honestly and direct to official support channels',
].join('\n');

// ── CHAT STATE ────────────────────────────────────────────────────────────────
var chatEl       = document.getElementById('chat');
var isProcessing = false;

// ── UTILITIES ─────────────────────────────────────────────────────────────────
function formatTime() {
  var d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function appendMessage(role, text) {
  var div = document.createElement('div');
  div.className = 'msg ' + role;

  // Avatar
  var avatarDiv = document.createElement('div');
  avatarDiv.className = 'msg-avatar';
  if (role === 'ai') {
    avatarDiv.innerHTML = '<img src="nexusai.png" alt="NEXUS AI">';
  } else {
    if (avatarUrl && avatarUrl !== 'nexusai.png') {
      avatarDiv.innerHTML = '<img src="' + avatarUrl + '" alt="' + displayName + '">';
    } else {
      avatarDiv.textContent = displayName.charAt(0).toUpperCase();
    }
  }

  // Bubble wrapper (bubble + timestamp)
  var wrap = document.createElement('div');
  wrap.style.display = 'flex';
  wrap.style.flexDirection = 'column';
  wrap.style.maxWidth = '80%';

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  try {
    bubble.innerHTML = marked.parse(text);
  } catch(e) {
    bubble.textContent = text;
  }

  var time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = formatTime();

  wrap.appendChild(bubble);
  wrap.appendChild(time);

  if (role === 'user') {
    div.appendChild(wrap);
    div.appendChild(avatarDiv);
  } else {
    div.appendChild(avatarDiv);
    div.appendChild(wrap);
  }

  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  removeTyping();
  var div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';

  var avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.innerHTML = '<img src="nexusai.png" alt="NEXUS AI">';

  var bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById('typingIndicator');
  if (t) t.parentNode.removeChild(t);
}

// ── WELCOME SCREEN ────────────────────────────────────────────────────────────
function showWelcome() {
  var div = document.createElement('div');
  div.className = 'welcome';
  div.id = 'welcomeScreen';

  div.innerHTML = [
    '<div class="welcome-avatar"><img src="' + avatarUrl + '" alt="avatar" onerror="this.src=\'nexusai.png\'"></div>',
    '<div class="welcome-badge">NEXUS AI · SUPPORT AGENT</div>',
    '<div class="welcome-title">How can I help?</div>',
    '<div class="welcome-text">Hi, <strong>' + displayName + '</strong>! I\'m your NEXUS AI support agent.<br>Ask me about bugs, the Studio plugin, credits, AI Chat tips, and more.</div>',
    '<div class="welcome-hints">',
      '<div class="hint-chip" onclick="fillHint(this)"><span class="hint-icon">🔌</span>My Studio plugin shows Studio: OFF</div>',
      '<div class="hint-chip" onclick="fillHint(this)"><span class="hint-icon">💳</span>I paid but didn\'t receive my credits</div>',
      '<div class="hint-chip" onclick="fillHint(this)"><span class="hint-icon">🤖</span>How do I get better AI output?</div>',
      '<div class="hint-chip" onclick="fillHint(this)"><span class="hint-icon">⚠️</span>I\'m getting an error when using the AI Chat</div>',
    '</div>',
  ].join('');

  chatEl.appendChild(div);
}

function fillHint(el) {
  var text = el.textContent.trim().replace(/^[^\w]+/, '').trim();
  document.getElementById('userInput').value = text;
  document.getElementById('userInput').focus();
}

// ── EXPLICIT CODE REQUEST FILTER ──────────────────────────────────────────────
function isExplicitCodeRequest(text) {
  var lower = text.toLowerCase();
  var pattern = /(create|make|build|write|code|generate|give me|provide)\s+(a |an |the )?(script|code|lua|luau|gui|game|npc|shop|loading screen|admin panel|leaderboard|datastore|module)/i;
  return pattern.test(lower);
}

// ── SEND MESSAGE ──────────────────────────────────────────────────────────────
async function sendMsg() {
  if (isProcessing) return;
  var input = document.getElementById('userInput');
  var text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  // Remove welcome screen if present
  var ws = document.getElementById('welcomeScreen');
  if (ws) ws.parentNode.removeChild(ws);

  appendMessage('user', text);

  // Soft-block explicit code write requests
  if (isExplicitCodeRequest(text)) {
    var refusal = [
      '🙏 I\'m not able to write Lua/Roblox scripts here — that\'s the main AI Chat\'s job!',
      '',
      'Head over to the **[NEXUS AI Chat](/chats)** and ask the same thing there.',
      'The AI will write the code directly for you, and you can even inject it into Roblox Studio via the plugin.',
      '',
      '**Tip:** For better results, be specific in your prompt — for example:',
      '> *"Create a loading screen GUI with an animated progress bar and a \'Loading…\' label centered on the screen."*',
      '',
      'Need help with anything else? 😊',
    ].join('\n');
    appendMessage('ai', refusal);
    return;
  }

  isProcessing = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    var res = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        provider:   'gemini',
        model:      'gemini-2.5-flash-lite',
        messages:   [{ role: 'user', content: text }],
        system:     SYSTEM_PROMPT,
        max_tokens: 1024
      })
    });

    if (!res.ok) throw new Error('Server returned ' + res.status);

    var data  = await res.json();
    var reply = data.content || 'Sorry, something went wrong. Please try again.';
    removeTyping();
    appendMessage('ai', reply);

  } catch (e) {
    removeTyping();
    appendMessage('ai', '⚠️ **Connection error.** Failed to reach the server.\n\nPlease try again in a moment, or contact us at **arifiinytid@gmail.com**.');
  } finally {
    isProcessing = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// ── INPUT HANDLERS ────────────────────────────────────────────────────────────
var userInput = document.getElementById('userInput');
userInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
userInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

// ── BOOT ─────────────────────────────────────────────────────────────────────
showWelcome();
</script>
