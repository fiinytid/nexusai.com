<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS AI — Agent Bantuan</title>
    <link rel="icon" href="nexusai.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #030312; --bg2: #06071a; --bg3: #0a0b22;
            --card: rgba(0,229,255,.04); --hover: rgba(0,229,255,.07);
            --cyan: #00e5ff; --cyan2: rgba(0,229,255,.35);
            --purple: #8800ff; --pink: #ff2d6b; --green: #00ffaa; --yellow: #ffd600;
            --text: #b8cfff; --dim: #3a4a7a;
            --b: rgba(0,229,255,.12); --r: 8px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; font-family:'JetBrains Mono',monospace; background:var(--bg); color:var(--text); font-size:13px; overflow:hidden; }
        body::before { content:''; position:fixed; inset:0; background:linear-gradient(rgba(0,229,255,.012)1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.012)1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
        #container { display:flex; flex-direction:column; height:100vh; position:relative; z-index:1; }
        #header { padding:12px 16px; background:var(--bg2); border-bottom:1px solid var(--b); display:flex; align-items:center; gap:10px; flex-shrink:0; }
        #header .logo { width:30px; height:30px; border-radius:8px; overflow:hidden; }
        #header .logo img { width:100%; height:100%; object-fit:cover; display:block; }
        #header .title { font-family:'Orbitron',sans-serif; font-size:12px; font-weight:700; color:var(--cyan); flex:1; }
        #header .user-info { display:flex; align-items:center; gap:8px; margin-right:8px; }
        #header .user-avatar { width:24px; height:24px; border-radius:50%; border:1.5px solid var(--cyan2); object-fit:cover; background:var(--bg3); }
        #header .user-name { font-size:10px; color:white; font-weight:500; max-width:100px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        #backBtn { background:rgba(255,45,107,.08); border:1px solid rgba(255,45,107,.2); color:var(--pink); padding:5px 12px; border-radius:var(--r); font-size:10px; cursor:pointer; transition:.15s; }
        #backBtn:hover { border-color:var(--pink); background:rgba(255,45,107,.15); }
        #chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
        #chat::-webkit-scrollbar { width:3px; }
        #chat::-webkit-scrollbar-thumb { background:var(--b); }
        .welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; gap:10px; color:var(--dim); padding:20px; }
        .welcome-avatar { width:70px; height:70px; border-radius:50%; overflow:hidden; border:2px solid rgba(0,229,255,.3); margin-bottom:6px; }
        .welcome-avatar img { width:100%; height:100%; object-fit:cover; }
        .welcome-title { font-family:'Orbitron',sans-serif; font-size:20px; font-weight:900; background:linear-gradient(135deg,var(--cyan),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .welcome-text { font-size:13px; max-width:400px; line-height:1.7; }
        .msg { display:flex; gap:8px; animation:msgIn .2s ease; }
        @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
        .msg-avatar { width:28px; height:28px; border-radius:50%; overflow:hidden; flex-shrink:0; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--cyan); }
        .msg-avatar img { width:100%; height:100%; object-fit:cover; }
        .msg-bubble { max-width:80%; padding:10px 14px; border-radius:10px; line-height:1.6; font-size:12.5px; word-break:break-word; overflow-wrap:break-word; min-width:0; }
        .msg.user .msg-bubble { background:linear-gradient(135deg,rgba(0,229,255,.08),rgba(136,0,255,.08)); border:1px solid rgba(0,229,255,.15); border-radius:10px 2px 10px 10px; color:white; margin-left:auto; }
        .msg.ai .msg-bubble { background:var(--bg2); border:1px solid var(--b); border-radius:2px 10px 10px 10px; color:var(--text); }
        .msg-bubble p { margin:0 0 6px; }
        .msg-bubble p:last-child { margin-bottom:0; }
        .msg-bubble ul, .msg-bubble ol { padding-left:18px; margin:6px 0; }
        .msg-bubble li { margin-bottom:3px; }
        .msg-bubble strong { color:white; }
        .msg-bubble code { background:rgba(0,229,255,.08); padding:2px 5px; border-radius:3px; font-size:10px; color:var(--cyan); word-break:break-all; }
        .input-area { padding:12px 16px; border-top:1px solid var(--b); background:var(--bg2); display:flex; gap:10px; align-items:flex-end; }
        #userInput { flex:1; background:var(--bg3); border:1px solid var(--b); border-radius:10px; padding:10px 14px; color:white; font-family:'JetBrains Mono',monospace; font-size:13px; resize:none; min-height:44px; max-height:120px; outline:none; line-height:1.5; }
        #userInput::placeholder { color:var(--dim); }
        .btn-send { width:38px; height:38px; background:linear-gradient(135deg,var(--cyan),var(--purple)); border:none; border-radius:50%; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.2s; flex-shrink:0; }
        .btn-send:hover { opacity:.8; transform:scale(1.05); }
        .btn-send svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; }
        .typing { display:flex; gap:8px; animation:msgIn .2s ease; }
        .typing-dot { width:8px; height:8px; border-radius:50%; background:var(--cyan); animation:pulse 1.2s infinite; }
        .typing-dot:nth-child(2) { animation-delay:.2s; }
        .typing-dot:nth-child(3) { animation-delay:.4s; }
        @keyframes pulse { 0%,60%,100%{opacity:.2} 30%{opacity:1} }
        @media (max-width:600px) {
            #header { padding:8px 12px; }
            #chat { padding:10px; }
            .welcome-avatar { width:50px; height:50px; }
            .welcome-title { font-size:16px; }
            .input-area { padding:8px 10px; }
        }
    </style>
</head>
<body>
<div id="container">
    <div id="header">
        <div class="logo"><img src="nexusai.png" onerror="this.style.background='linear-gradient(135deg,#00e5ff,#8800ff)'"></div>
        <div class="title">NEXUS AI Agent</div>
        <div class="user-info" id="userInfo">
            <img class="user-avatar" id="userAvatar" src="nexusai.png" onerror="this.style.display='none'">
            <span class="user-name" id="userName">-</span>
        </div>
        <button id="backBtn" onclick="goBack()">Tutup</button>
    </div>
    <div id="chat"></div>
    <div class="input-area">
        <textarea id="userInput" placeholder="Deskripsikan masalahmu..." rows="1"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMsg()">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>

<script>
    // ─── SESSION & LANGUAGE ─────────────────────────────────
    const SESSION = (() => { try { return JSON.parse(localStorage.getItem('nexus_session')); } catch(e){} })();
    const user = SESSION?.user || {};
    const displayName = user.displayName || user.username || 'Pengguna';
    const username = user.username || 'pengguna';
    const avatarUrl = user.avatar || 'nexusai.png';
    const lang = localStorage.getItem('nexus_lang') || 'id';

    // Tampilkan info user di header
    document.getElementById('userAvatar').src = avatarUrl;
    document.getElementById('userName').textContent = displayName;

    // Fungsi kembali
    function goBack() {
        if (window.opener) window.close();
        window.location.href = 'chats.html';
    }

    // ─── SYSTEM PROMPT (DIPERBAIKI) ─────────────────────────
    const SYSTEM_ID = `🌟 Kamu adalah **NEXUS AI Support Agent**, asisten bantuan resmi dari platform **NEXUS AI** — AI Roblox Developer Assistant tercanggih yang dibuat oleh **NEXUS STUDIO (FIINYTID25)**.

🎯 **TUGAS UTAMA KAMU:**
Membantu **${displayName}** (@${username}) dengan SEMUA masalah teknis seputar:
- Website NEXUS AI (chats.html, GUI Editor, login, pembayaran, settings, dll.)
- Plugin NEXUS AI untuk Roblox Studio (instalasi, koneksi, inject, error, status offline)
- **Penggunaan fitur AI Chat** – termasuk troubleshooting hasil output AI, tips prompt, cara meminta script, dsb.

🧠 **PENGETAHUAN MENDALAM TENTANG NEXUS AI:**
- NEXUS AI memiliki 3 fitur utama:
  1. **Chat AI** — menulis kode Lua/Luau, debug script, membuat GUI, sistem game lengkap
  2. **GUI Editor** — visual builder untuk merancang antarmuka Roblox tanpa koding
  3. **Plugin Studio** — injeksi langsung via JSON commands & Lua ke Roblox Studio
- Halaman web: chats.html (utama), login.html, payment, agent.html (kamu di sini)
- Plugin harus diinstal di: \`C:\\Users\\[Nama]\\AppData\\Local\\Roblox\\Plugins\\\`
- Plugin butuh izin **HTTP Requests** & **Script Injection** di Roblox Studio
- Status koneksi: **"Studio: ON"** (hijau) = terhubung, **"Studio: OFF"** (merah) = belum connect
- Tersedia banyak model AI: Gemini 2.5 Flash, Mistral, Groq, DeepSeek, dll.
- **Credits** adalah mata uang virtual untuk memakai AI. Bisa dibeli, klaim harian, atau redeem code
- Daily Credits: Free Plan +2 CR/hari, Pro Plan +25 CR/hari
- Bug bisa dilaporkan lewat **Settings → Laporkan Masalah**
- Discord resmi: **discord.gg/HuGtbRvD**

📏 **ATURAN WAJIB (DIPERJELAS):**
- ✅ Bantu troubleshooting website, plugin, **dan penggunaan AI Chat**. Misalnya: mengapa hasil kode tidak lengkap, hanya GUI saja, error, dll.
- ❌ **JANGAN PERNAH menulis kode Lua/Luau/script Roblox** di sini. Katakan: _"Untuk mendapatkan kode lengkap, silakan minta langsung di chat utama NEXUS AI."_
- ❌ **JANGAN menjadi AI pembuat kode.** Kamu hanya support, bukan pengganti chat AI utama.
- 💡 **Berikan tips prompt** jika pengguna kebingungan (contoh: "Coba prompt yang lebih spesifik: 'Buat loading screen dengan progress bar dan teks Loading...' ").
- 🔗 Jika masalah berlanjut, arahkan ke chat utama, lapor bug, atau Discord.
- 🗣️ Gunakan Bahasa Indonesia ramah, santai, profesional. Panggil **${displayName}**.

✨ **KARAKTER:**
Kamu ceria, membantu, sangat sabar. Jawaban singkat padat, langsung ke solusi tanpa bertele-tele.`;

    const SYSTEM_EN = `🌟 You are the **NEXUS AI Support Agent**, the official help assistant for **NEXUS AI** — the most advanced Roblox Developer AI platform created by **NEXUS STUDIO (FIINYTID25)**.

🎯 **YOUR MAIN TASK:**
Assist **${displayName}** (@${username}) with ALL technical issues regarding:
- NEXUS AI website (chats.html, GUI Editor, login, payment, settings, etc.)
- NEXUS AI Roblox Studio plugin (installation, connection, injection, errors, offline status)
- **Usage of the AI Chat feature** – troubleshooting output, prompt tips, etc.

🧠 **DEEP KNOWLEDGE ABOUT NEXUS AI:**
- NEXUS AI has 3 main features:
  1. **AI Chat** — writes Lua/Luau code, debugs scripts, builds GUIs, complete game systems
  2. **GUI Editor** — visual builder to design Roblox interfaces without coding
  3. **Studio Plugin** — direct injection via JSON commands & Lua into Roblox Studio
- Web pages: chats.html (main), login.html, payment, agent.html (you are here)
- Plugin must be installed in: \`C:\\Users\\[Name]\\AppData\\Local\\Roblox\\Plugins\\\`
- Plugin needs **HTTP Requests** & **Script Injection** permissions in Roblox Studio
- Connection status: **"Studio: ON"** (green) = connected, **"Studio: OFF"** (red) = not connected
- Many AI models available: Gemini 2.5 Flash, Mistral, Groq, DeepSeek, etc.
- **Credits** are virtual currency to use AI. Purchasable, daily claim, or redeem codes
- Daily Credits: Free Plan +2 CR/day, Pro Plan +25 CR/day
- Bugs can be reported via **Settings → Report Issue**
- Official Discord: **discord.gg/HuGtbRvD**

📏 **STRICT RULES (CLARIFIED):**
- ✅ Help with website, plugin, **and AI Chat usage** troubleshooting. E.g., why code output is incomplete, only GUI, errors, etc.
- ❌ **NEVER write Lua/Luau/Roblox code** here. Say: _"For the full code, please request it directly in the main NEXUS AI chat."_
- ❌ **DO NOT act as a code-generating AI.** You are support, not a replacement for the main AI.
- 💡 **Give prompt tips** if the user is stuck (e.g., "Try a more specific prompt: 'Create a loading screen with a progress bar and Loading... text'").
- 🔗 If issues persist, direct to main chat, report bug, or Discord.
- 🗣️ Use friendly, casual yet professional English. Address **${displayName}**.

✨ **CHARACTER:**
You are cheerful, helpful, and very patient. Your answers are short yet dense, straight to the solution without fluff.`;

    // ─── CHAT STATE ─────────────────────────────────────────
    const chatEl = document.getElementById('chat');
    let isProcessing = false;

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        if (role === 'ai') {
            avatar.innerHTML = '<img src="nexusai.png">';
        } else {
            if (avatarUrl && avatarUrl !== 'nexusai.png') {
                avatar.innerHTML = `<img src="${avatarUrl}">`;
            } else {
                avatar.textContent = displayName.charAt(0).toUpperCase();
            }
        }
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        try { bubble.innerHTML = marked.parse(text); } catch(e) { bubble.textContent = text; }
        bubble.style.overflowWrap = 'break-word';
        bubble.style.wordBreak = 'break-word';
        div.appendChild(role === 'user' ? bubble : avatar);
        div.appendChild(role === 'user' ? avatar : bubble);
        chatEl.appendChild(div);
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function showTyping() {
        removeTyping();
        const div = document.createElement('div');
        div.className = 'typing';
        div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
        chatEl.appendChild(div);
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function removeTyping() {
        const t = document.querySelector('.typing');
        if (t) t.remove();
    }

    function showWelcome() {
        const welcomeDiv = document.createElement('div');
        welcomeDiv.className = 'welcome';
        welcomeDiv.innerHTML = `
            <div class="welcome-avatar"><img src="${avatarUrl}" onerror="this.src='nexusai.png'"></div>
            <div class="welcome-title">NEXUS AI Agent</div>
            <div class="welcome-text">
                ${lang === 'id'
                    ? `👋 Halo, <strong>${displayName}</strong>! Ada yang bisa saya bantu terkait bug, masalah teknis, atau penggunaan NEXUS AI?`
                    : `👋 Hello, <strong>${displayName}</strong>! How can I help you with bugs, technical issues, or usage of NEXUS AI?`}
            </div>
        `;
        chatEl.appendChild(welcomeDiv);
    }

    /**
     * Deteksi apakah pengguna MEMINTA KODE secara eksplisit (bukan troubleshooting).
     * Hanya tolak jika ada frasa imperatif seperti "buatkan script", "tulis kode", "bikinin gui".
     */
    function isExplicitCodeRequest(text) {
        const lower = text.toLowerCase();
        // Pola meminta dibuatkan sesuatu
        const idExplicit = /(buat(kan|in|lah)?|bikin(kan|in)?|tulis(kan|in)?|kodein|sunting|berikan|kasih(kan)?)\s+(script|kode|lua|gui|game|loading screen|npc|shop|admin|leaderboard)/i;
        const enExplicit = /(create|make|build|write|code|generate|give me|provide)\s+(a |the )?(script|code|lua|gui|game|npc|shop|loading screen|admin|leaderboard)/i;
        return (lang === 'id' ? idExplicit.test(lower) : enExplicit.test(lower));
    }

    async function sendMsg() {
        if (isProcessing) return;
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.style.height = 'auto';

        const welcome = document.querySelector('.welcome');
        if (welcome) welcome.remove();

        appendMessage('user', text);

        // Hanya tolak jika benar-benar meminta penulisan kode
        if (isExplicitCodeRequest(text)) {
            const refuse = lang === 'id'
                ? '🙏 Maaf, saya tidak bisa menulis kode Lua/Roblox di sini. Untuk mendapatkan script lengkap, silakan gunakan **chat utama NEXUS AI** ya. Di sana AI bisa langsung menuliskan kodenya!'
                : '🙏 Sorry, I cannot write Lua/Roblox code here. For full scripts, please use the **main NEXUS AI chat**. The AI there can directly write the code for you!';
            appendMessage('ai', refuse);
            return;
        }

        isProcessing = true;
        showTyping();

        const systemPrompt = lang === 'id' ? SYSTEM_ID : SYSTEM_EN;

        try {
            const res = await fetch('/api/ai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    provider: 'gemini',
                    model: 'gemini-2.5-flash-lite',
                    messages: [{ role: 'user', content: text }],
                    system: systemPrompt,
                    max_tokens: 1024
                })
            });
            if (!res.ok) throw new Error('Server error');
            const data = await res.json();
            const reply = data.content || (lang === 'id' ? 'Maaf, terjadi kesalahan.' : 'Sorry, an error occurred.');
            removeTyping();
            appendMessage('ai', reply);
        } catch (e) {
            removeTyping();
            appendMessage('ai', lang === 'id' ? '⚠️ Gagal menghubungkan server. Coba lagi nanti.' : '⚠️ Failed to reach server. Try again later.');
        } finally {
            isProcessing = false;
        }
    }

    document.getElementById('userInput').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    document.getElementById('userInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });

    showWelcome();
</script>
</body>
</html>
